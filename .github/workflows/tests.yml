name: Tests

# Run the full Vitest suite on every push and PR. Catches regressions before
# they reach the daemon. Fast (~30s) and cheap (free tier covers it).
#
# This is separate from bourbon-scout.yml (the cron-driven scan workflow),
# which is currently disabled in favor of the local launchd daemon.

on:
  push:
    branches: [main]
    paths:
      - "scraper.js"
      - "lib/**"
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/tests.yml"
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          # Prevent dotenv from looking for a .env that doesn't exist in CI
          DOTENV_CONFIG_PATH: /tmp/empty
