name: Bourbon Scout

on:
  schedule:
    # 30-min default: Sun/Mon/Tue/Thu/Sat, 5 PM–10 AM MST (UTC hours 0-16)
    # Arizona = UTC-7 (no DST): 5 PM MST = 00:00 UTC, 10 AM MST = 17:00 UTC
    - cron: "3,33 0-16 * * 0,1,2,4,6"
    # 20-min boost: Tue night→Wed + Thu night→Fri (Wed/Fri in UTC), 5 PM–10 AM MST
    - cron: "3,23,43 0-16 * * 3,5"
  workflow_dispatch: {} # Manual trigger from GitHub UI

jobs:
  scan:
    runs-on: [self-hosted, bourbon]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      # Persist state files so stock-change tracking works across runs
      - uses: actions/cache@v4
        with:
          path: |
            state.json
            stores.json
            browser-state.json
          key: bourbon-state-local-${{ github.run_id }}
          restore-keys: bourbon-state-local-

      - name: Run scan
        run: node scraper.js
        env:
          RUN_ONCE: "true"
          ZIP_CODE: "85283"
          SEARCH_RADIUS_MILES: "15"
          MAX_STORES_PER_RETAILER: "5"
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REALERT_EVERY_N_SCANS: "4"
          KROGER_CLIENT_ID: ${{ secrets.KROGER_CLIENT_ID }}
          KROGER_CLIENT_SECRET: ${{ secrets.KROGER_CLIENT_SECRET }}
          SAFEWAY_API_KEY: ${{ secrets.SAFEWAY_API_KEY }}
